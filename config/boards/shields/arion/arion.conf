# Rotary encoder
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Display (SSD1306 OLED)
CONFIG_DISPLAY=y
CONFIG_ZMK_DISPLAY=y

# RGB (only if you have WS2812 LEDs wired)
CONFIG_ZMK_RGB_UNDERGLOW=y
CONFIG_WS2812_STRIP=y

# Enable ZMK Studio
CONFIG_ZMK_STUDIO=y

# Enable Bluetooth (if using wireless)
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="ArionAryabhatta"
CONFIG_ZMK_RPC_BLE=y

CONFIG_ZMK_RPC=y
CONFIG_ZMK_RPC_USB_UART=y
CONFIG_USB_DEVICE_STACK=y
CONFIG_SERIAL=y
